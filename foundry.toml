[profile.default]        # 默认配置 Profile
src = "src"              # 合约源代码目录
out = "out"              # 编译输出目录（ABI、bytecode等）
libs = ["lib"]           # 依赖库目录
test = "test"            # 测试文件目录
cache_path = "cache"     # 缓存目录
force = false            # 是否强制重新编译（false=只在更改时编译）
evm_version = "cancun"   # 使用 Cancun 版本的 EVM（最新版）
optimizer = true         # 开启字节码优化器
optimizer_runs = 200     # 优化运行次数（影响 gas 成本）
via_ir = true            # 通过 IR（中间表示）编译，生成更优化的代码
solc_version = "0.8.24"  # 指定版本
fs_permissions = [
    { access = 'read-write', path = 'deployments/' },  # 部署记录可读写
    { access = 'read', path = 'deploy-config/' },      # 部署配置只读
    { access = 'read', path = 'broadcast/' },          # 广播日志只读
    { access = 'read', path = 'script/' },             # 脚本文件只读
]


verbosity = 2       # 日志详细程度（0-4，越大越详细）
ffi = false         # 禁用外部函数接口调用（安全性）
remappings = [
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

[profile.default.fuzz]
runs = 1000                    # 每个测试运行 1000 次随机输入
max_test_rejects = 65536       # 最多拒绝 65536 次输入
seed = '0x3e8'                 # 随机种子（固定为 1000，便于复现）
dictionary_weight = 40         # 字典权重（影响输入生成）
include_storage = true         # 包含存储状态
include_push_bytes = true      # 包含推送字节

[profile.intense]              # 高强度测试 profile
fuzz = { runs = 10000 }        # 运行 10000 次模糊测试

# 网络配置
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC}"
mainnet = "${MAINNET_RPC}"
movae = "${MOVAE_RPC}"
localhost = "${LOCAL_RPC}"
# Etherscan 验证配置
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
mainnet = { key = "${ETHERSCAN_API_KEY}" }

